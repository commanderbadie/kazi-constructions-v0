  <line x1="188" y1="181" x2="212" y2="181" stroke="#1B2B4B" stroke-width="0.5"/>
  <rect x="268" y="172" width="24" height="18" rx="2" fill="#87CEEB" opacity="0.5" stroke="#1B2B4B" stroke-width="0.5"/>
