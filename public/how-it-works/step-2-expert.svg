<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Floor shadow -->
  <ellipse cx="240" cy="330" rx="190" ry="18" fill="#1B2B4B" opacity="0.05"/>
  <!-- Table -->
  <rect x="100" y="180" width="280" height="12" rx="3" fill="#5C3A1E"/>
  <rect x="100" y="180" width="280" height="6" rx="3" fill="#7B4F2A"/>
  <!-- Table legs -->
  <rect x="130" y="192" width="6" height="120" fill="#888"/>
  <rect x="344" y="192" width="6" height="120" fill="#888"/>
  <!-- Chair 1 (left) -->
  <rect x="140" y="210" width="50" height="6" rx="2" fill="#444"/>
  <rect x="142" y="216" width="4" height="90" fill="#666"/>
  <rect x="184" y="216" width="4" height="90" fill="#666"/>
  <rect x="138" y="170" width="54" height="40" rx="4" fill="#555"/>
  <!-- Chair 2 (right) -->
  <rect x="290" y="210" width="50" height="6" rx="2" fill="#444"/>
  <rect x="292" y="216" width="4" height="90" fill="#666"/>
  <rect x="334" y="216" width="4" height="90" fill="#666"/>
  <rect x="288" y="170" width="54" height="40" rx="4" fill="#555"/>
  <!-- Documents on table -->
  <rect x="190" y="168" width="40" height="12" rx="2" fill="#ffffff" stroke="#e4e4e7"/>
  <rect x="195" y="171" width="20" height="2" rx="1" fill="#1B2B4B" opacity="0.3"/>
  <rect x="195" y="175" width="28" height="2" rx="1" fill="#1B2B4B" opacity="0.2"/>
  <rect x="240" y="165" width="45" height="15" rx="2" fill="#ffffff" stroke="#e4e4e7"/>
  <rect x="245" y="169" width="25" height="2" rx="1" fill="#C69B3C" opacity="0.5"/>
  <rect x="245" y="173" width="32" height="2" rx="1" fill="#1B2B4B" opacity="0.2"/>
  <!-- Coffee cups -->
  <ellipse cx="175" cy="170" rx="8" ry="4" fill="#1B2B4B" opacity="0.7"/>
  <rect x="167" y="166" width="16" height="10" rx="3" fill="#ffffff" stroke="#ddd"/>
  <ellipse cx="175" cy="166" rx="6" ry="3" fill="#8B5E3C" opacity="0.6"/>
  <!-- Handshake icon (decorative) -->
  <circle cx="240" cy="80" r="45" fill="#C69B3C" opacity="0.08"/>
  <circle cx="240" cy="80" r="35" fill="none" stroke="#C69B3C" stroke-width="2" opacity="0.4"/>
  <!-- Two people silhouettes (abstract) -->
  <circle cx="215" cy="65" r="10" fill="#1B2B4B" opacity="0.7"/>
  <path d="M200 95c0-10 7-18 15-18s15 8 15 18" fill="#1B2B4B" opacity="0.5"/>
  <circle cx="265" cy="65" r="10" fill="#C69B3C" opacity="0.7"/>
  <path d="M250 95c0-10 7-18 15-18s15 8 15 18" fill="#C69B3C" opacity="0.5"/>
  <!-- Handshake lines -->
  <path d="M230 90 L250 90" stroke="#1B2B4B" stroke-width="2" stroke-linecap="round"/>
  <path d="M235 86 L245 94" stroke="#C69B3C" stroke-width="1.5" stroke-linecap="round"/>
</svg>
