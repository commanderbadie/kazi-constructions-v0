<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Background shadow -->
  <ellipse cx="240" cy="340" rx="180" ry="14" fill="#1B2B4B" opacity="0.06"/>

  <!-- Blueprint paper -->
  <rect x="60" y="40" width="360" height="280" rx="6" fill="#ffffff" stroke="#1B2B4B" stroke-width="2"/>

  <!-- Blueprint blue tint background -->
  <rect x="60" y="40" width="360" height="280" rx="6" fill="#1B2B4B" opacity="0.02"/>

  <!-- Grid lines -->
  <line x1="60" y1="100" x2="420" y2="100" stroke="#1B2B4B" stroke-width="0.5" opacity="0.1"/>
  <line x1="60" y1="160" x2="420" y2="160" stroke="#1B2B4B" stroke-width="0.5" opacity="0.1"/>
  <line x1="60" y1="220" x2="420" y2="220" stroke="#1B2B4B" stroke-width="0.5" opacity="0.1"/>
  <line x1="60" y1="280" x2="420" y2="280" stroke="#1B2B4B" stroke-width="0.5" opacity="0.1"/>
  <line x1="160" y1="40" x2="160" y2="320" stroke="#1B2B4B" stroke-width="0.5" opacity="0.1"/>
  <line x1="260" y1="40" x2="260" y2="320" stroke="#1B2B4B" stroke-width="0.5" opacity="0.1"/>
  <line x1="360" y1="40" x2="360" y2="320" stroke="#1B2B4B" stroke-width="0.5" opacity="0.1"/>

  <!-- Main floor plan rooms (bold, clear) -->
  <!-- Living Room -->
  <rect x="85" y="70" width="130" height="100" fill="#C69B3C" opacity="0.06" stroke="#1B2B4B" stroke-width="2.5"/>
  <text x="120" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1B2B4B">Living Room</text>

  <!-- Kitchen -->
  <rect x="215" y="70" width="90" height="100" fill="#C69B3C" opacity="0.06" stroke="#1B2B4B" stroke-width="2.5"/>
  <text x="230" y="125" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1B2B4B">Kitchen</text>

  <!-- Bedroom 1 -->
  <rect x="305" y="70" width="100" height="100" fill="#C69B3C" opacity="0.06" stroke="#1B2B4B" stroke-width="2.5"/>
  <text x="315" y="120" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1B2B4B">Bedroom 1</text>
  <text x="330" y="138" font-family="Arial, sans-serif" font-size="10" fill="#1B2B4B" opacity="0.5">12' x 14'</text>

  <!-- Bathroom -->
  <rect x="85" y="170" width="80" height="80" fill="#1B2B4B" opacity="0.04" stroke="#1B2B4B" stroke-width="2.5"/>
  <text x="98" y="215" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1B2B4B">Bath</text>

  <!-- Bedroom 2 -->
  <rect x="165" y="170" width="140" height="80" fill="#C69B3C" opacity="0.06" stroke="#1B2B4B" stroke-width="2.5"/>
  <text x="190" y="215" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1B2B4B">Bedroom 2</text>

  <!-- Balcony -->
  <rect x="305" y="170" width="100" height="80" fill="#22C55E" opacity="0.06" stroke="#1B2B4B" stroke-width="2.5"/>
  <text x="322" y="215" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1B2B4B">Balcony</text>

  <!-- Door arcs (gold, larger) -->
  <path d="M130 170 A20 20 0 0 1 150 170" fill="none" stroke="#C69B3C" stroke-width="2.5"/>
  <path d="M210 170 A20 20 0 0 1 230 170" fill="none" stroke="#C69B3C" stroke-width="2.5"/>
  <path d="M340 170 A20 20 0 0 1 360 170" fill="none" stroke="#C69B3C" stroke-width="2.5"/>

  <!-- Dimension lines (gold) -->
  <line x1="85" y1="56" x2="215" y2="56" stroke="#C69B3C" stroke-width="1.5"/>
  <line x1="85" y1="52" x2="85" y2="60" stroke="#C69B3C" stroke-width="1.5"/>
  <line x1="215" y1="52" x2="215" y2="60" stroke="#C69B3C" stroke-width="1.5"/>
  <text x="135" y="52" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C69B3C">18'</text>

  <line x1="305" y1="56" x2="405" y2="56" stroke="#C69B3C" stroke-width="1.5"/>
  <line x1="305" y1="52" x2="305" y2="60" stroke="#C69B3C" stroke-width="1.5"/>
  <line x1="405" y1="52" x2="405" y2="60" stroke="#C69B3C" stroke-width="1.5"/>
  <text x="345" y="52" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C69B3C">14'</text>

  <!-- Compass -->
  <circle cx="380" cy="280" r="22" fill="#ffffff" stroke="#1B2B4B" stroke-width="2"/>
  <text x="374" y="274" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1B2B4B">N</text>
  <path d="M380 262 L376 276 L380 273 L384 276 Z" fill="#C69B3C"/>
  <path d="M380 298 L376 284 L380 287 L384 284 Z" fill="#1B2B4B" opacity="0.4"/>

  <!-- Title block -->
  <rect x="85" y="270" width="180" height="40" fill="#1B2B4B" opacity="0.05" stroke="#1B2B4B" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="95" y="288" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1B2B4B">KAZI CONSTRUCTIONS</text>
  <text x="95" y="303" font-family="Arial, sans-serif" font-size="10" fill="#C69B3C">Ground Floor Plan</text>

  <!-- Ruler (decorative, angled) -->
  <rect x="350" y="40" width="70" height="12" rx="2" fill="#C69B3C" opacity="0.8" transform="rotate(-20 385 46)"/>
  <rect x="360" y="58" width="55" height="8" rx="1.5" fill="#1B2B4B" opacity="0.6" transform="rotate(-20 387 62)"/>
</svg>
