<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Shadow -->
  <ellipse cx="240" cy="335" rx="180" ry="16" fill="#1B2B4B" opacity="0.05"/>
  <!-- Blueprint paper (large) -->
  <rect x="80" y="60" width="320" height="240" rx="4" fill="#1B2B4B" opacity="0.04"/>
  <rect x="90" y="70" width="300" height="220" rx="2" fill="#ffffff" stroke="#d4d4d8"/>
  <!-- Grid lines on blueprint -->
  <line x1="90" y1="110" x2="390" y2="110" stroke="#e4e4e7" stroke-dasharray="4 2"/>
  <line x1="90" y1="150" x2="390" y2="150" stroke="#e4e4e7" stroke-dasharray="4 2"/>
  <line x1="90" y1="190" x2="390" y2="190" stroke="#e4e4e7" stroke-dasharray="4 2"/>
  <line x1="90" y1="230" x2="390" y2="230" stroke="#e4e4e7" stroke-dasharray="4 2"/>
  <line x1="170" y1="70" x2="170" y2="290" stroke="#e4e4e7" stroke-dasharray="4 2"/>
  <line x1="250" y1="70" x2="250" y2="290" stroke="#e4e4e7" stroke-dasharray="4 2"/>
  <line x1="330" y1="70" x2="330" y2="290" stroke="#e4e4e7" stroke-dasharray="4 2"/>
  <!-- Floor plan - rooms -->
  <rect x="110" y="90" width="80" height="70" fill="none" stroke="#1B2B4B" stroke-width="2"/>
  <text x="130" y="130" font-family="Arial, sans-serif" font-size="8" fill="#1B2B4B" opacity="0.6">Living</text>
  <rect x="190" y="90" width="60" height="70" fill="none" stroke="#1B2B4B" stroke-width="2"/>
  <text x="200" y="130" font-family="Arial, sans-serif" font-size="8" fill="#1B2B4B" opacity="0.6">Kitchen</text>
  <rect x="250" y="90" width="80" height="70" fill="none" stroke="#1B2B4B" stroke-width="2"/>
  <text x="265" y="130" font-family="Arial, sans-serif" font-size="8" fill="#1B2B4B" opacity="0.6">Bedroom 1</text>
  <rect x="110" y="160" width="60" height="60" fill="none" stroke="#1B2B4B" stroke-width="2"/>
  <text x="118" y="195" font-family="Arial, sans-serif" font-size="8" fill="#1B2B4B" opacity="0.6">Bath</text>
  <rect x="170" y="160" width="80" height="60" fill="none" stroke="#1B2B4B" stroke-width="2"/>
  <text x="183" y="195" font-family="Arial, sans-serif" font-size="8" fill="#1B2B4B" opacity="0.6">Bedroom 2</text>
  <rect x="250" y="160" width="80" height="60" fill="none" stroke="#1B2B4B" stroke-width="2"/>
  <text x="268" y="195" font-family="Arial, sans-serif" font-size="8" fill="#1B2B4B" opacity="0.6">Balcony</text>
  <!-- Door arcs -->
  <path d="M145 160 A15 15 0 0 1 160 160" fill="none" stroke="#C69B3C" stroke-width="1.5"/>
  <path d="M225 160 A15 15 0 0 1 240 160" fill="none" stroke="#C69B3C" stroke-width="1.5"/>
  <path d="M295 160 A15 15 0 0 1 310 160" fill="none" stroke="#C69B3C" stroke-width="1.5"/>
  <!-- Dimensions -->
  <line x1="110" y1="80" x2="190" y2="80" stroke="#C69B3C" stroke-width="1"/>
  <line x1="110" y1="78" x2="110" y2="82" stroke="#C69B3C" stroke-width="1"/>
  <line x1="190" y1="78" x2="190" y2="82" stroke="#C69B3C" stroke-width="1"/>
  <text x="138" y="77" font-family="Arial, sans-serif" font-size="7" fill="#C69B3C">12'</text>
  <!-- Compass rose -->
  <circle cx="360" cy="260" r="18" fill="none" stroke="#1B2B4B" stroke-width="1.5"/>
  <text x="356" y="250" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1B2B4B">N</text>
  <path d="M360 245 L357 255 L360 253 L363 255 Z" fill="#C69B3C"/>
  <!-- Pencil/ruler decorative -->
  <rect x="340" y="80" width="50" height="8" rx="2" fill="#C69B3C" opacity="0.7" transform="rotate(-30 365 84)"/>
  <rect x="355" y="100" width="40" height="6" rx="1" fill="#1B2B4B" opacity="0.5" transform="rotate(-30 375 103)"/>
  <!-- Title block -->
  <rect x="280" y="250" width="100" height="30" fill="#1B2B4B" opacity="0.05" stroke="#1B2B4B" opacity="0.2"/>
  <text x="290" y="263" font-family="Arial, sans-serif" font-size="6" fill="#1B2B4B" opacity="0.5">KAZI CONSTRUCTIONS</text>
  <text x="290" y="273" font-family="Arial, sans-serif" font-size="6" fill="#C69B3C">Floor Plan - Ground</text>
</svg>
