<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Background shape -->
  <ellipse cx="240" cy="320" rx="180" ry="20" fill="#1B2B4B" opacity="0.06"/>
  <!-- Phone body -->
  <rect x="170" y="40" width="140" height="280" rx="20" fill="#1B2B4B"/>
  <rect x="178" y="56" width="124" height="248" rx="12" fill="#ffffff"/>
  <!-- Screen content -->
  <rect x="190" y="72" width="100" height="14" rx="3" fill="#C69B3C" opacity="0.2"/>
  <text x="195" y="83" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1B2B4B">Talk to our experts</text>
  <rect x="190" y="96" width="80" height="6" rx="2" fill="#1B2B4B" opacity="0.15"/>
  <rect x="190" y="108" width="60" height="6" rx="2" fill="#1B2B4B" opacity="0.1"/>
  <!-- Form fields -->
  <rect x="190" y="130" width="100" height="24" rx="5" fill="#f4f4f5" stroke="#e4e4e7"/>
  <text x="196" y="145" font-family="Arial, sans-serif" font-size="8" fill="#a1a1aa">Full Name</text>
  <rect x="190" y="162" width="100" height="24" rx="5" fill="#f4f4f5" stroke="#e4e4e7"/>
  <text x="196" y="177" font-family="Arial, sans-serif" font-size="8" fill="#a1a1aa">Email</text>
  <rect x="190" y="194" width="100" height="24" rx="5" fill="#f4f4f5" stroke="#e4e4e7"/>
  <text x="196" y="209" font-family="Arial, sans-serif" font-size="8" fill="#a1a1aa">+91 Phone Number</text>
  <rect x="190" y="226" width="100" height="24" rx="5" fill="#f4f4f5" stroke="#e4e4e7"/>
  <text x="196" y="241" font-family="Arial, sans-serif" font-size="8" fill="#a1a1aa">City</text>
  <!-- Submit button -->
  <rect x="190" y="262" width="100" height="28" rx="14" fill="#C69B3C"/>
  <text x="214" y="280" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">GET STARTED</text>
  <!-- Phone notch -->
  <rect x="218" y="44" width="44" height="6" rx="3" fill="#333"/>
  <!-- Decorative ring -->
  <circle cx="360" cy="100" r="40" fill="none" stroke="#C69B3C" stroke-width="3" opacity="0.3"/>
  <circle cx="360" cy="100" r="28" fill="#C69B3C" opacity="0.08"/>
  <!-- Phone icon in ring -->
  <path d="M352 88c0 0 2-1 4-1s4 1 4 1l3 4c1 1 0 3-1 4l-2 1c0 0-1 3-4 6s-6 4-6 4l-1-2c-1-1-3-2-4-1l-4 3c0 0 1 4 4 7s7 4 7 4" stroke="#C69B3C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Small dots decoration -->
  <circle cx="120" cy="180" r="4" fill="#C69B3C" opacity="0.3"/>
  <circle cx="128" cy="195" r="3" fill="#1B2B4B" opacity="0.2"/>
  <circle cx="115" cy="200" r="2" fill="#C69B3C" opacity="0.4"/>
</svg>
