<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Shadow -->
  <ellipse cx="240" cy="340" rx="180" ry="14" fill="#1B2B4B" opacity="0.05"/>
  <!-- Dashboard/Monitor -->
  <rect x="100" y="50" width="280" height="200" rx="12" fill="#1B2B4B"/>
  <rect x="108" y="58" width="264" height="176" rx="8" fill="#ffffff"/>
  <!-- Monitor stand -->
  <rect x="215" y="250" width="50" height="30" fill="#888"/>
  <rect x="190" y="278" width="100" height="8" rx="4" fill="#666"/>
  <!-- Dashboard content -->
  <!-- Header bar -->
  <rect x="108" y="58" width="264" height="28" rx="8" fill="#1B2B4B" opacity="0.05"/>
  <circle cx="124" cy="72" r="4" fill="#EF4444" opacity="0.7"/>
  <circle cx="136" cy="72" r="4" fill="#F59E0B" opacity="0.7"/>
  <circle cx="148" cy="72" r="4" fill="#22C55E" opacity="0.7"/>
  <text x="280" y="75" font-family="Arial, sans-serif" font-size="7" fill="#1B2B4B" opacity="0.5">Project Dashboard</text>
  <!-- Progress chart -->
  <rect x="120" y="96" width="120" height="60" rx="4" fill="#f9fafb" stroke="#e4e4e7"/>
